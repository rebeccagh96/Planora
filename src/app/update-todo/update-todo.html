<section class="update-todo">
    <button class="back-btn" [routerLink]="['/list/', toDoListId]">Tillbaka</button>
    <form (ngSubmit)="updateToDo()">
        <h1>Redigera uppgift:</h1>
        <input type="hidden" name="toDoId" [(ngModel)]="toDoId">
        <label class="label-name">Nytt namn på uppgiften:</label>
        <input class="input-name" type="text" name="name" [(ngModel)]="name" required>
        <button class="update-todo-btn" type="submit">Uppdatera uppgift</button>
    </form>
    <button class="update-todo-btn" (click)="deleteToDo(toDoId)">Radera uppgift</button>
</section>
