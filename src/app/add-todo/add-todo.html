<section class="add-todo">
  <button class="back-btn" [routerLink]="['/list/', toDoListId]">
    <i class="fa-solid fa-angle-left icon"></i>Tillbaka
  </button>
  <form (ngSubmit)="createToDo()">
    <h1>Lägg till uppgift</h1>
    <label for="todo-name" class="label-name">Namn på uppgift:</label>
    <input class="input-name" type="text" name="name" id="todo-name" [(ngModel)]="name" required />
    <button class="add-todo-btn" type="submit">Lägg till uppgift</button>
  </form>
  <app-notification #notification></app-notification>
</section>
