<section class="add-todo">
    <button class="back-btn" [routerLink]="['/list/', toDoListId]">Tillbaka</button>
    <form (ngSubmit)="createToDo()">
        <h1>Lägg till uppgift</h1>
        <label class="label-name">Namn på uppgift:</label>
        <input class="input-name" type="text" name="name" [(ngModel)]="name" required>
        <button class="add-todo-btn" type="submit">Lägg till uppgift</button>
    </form>
</section>
