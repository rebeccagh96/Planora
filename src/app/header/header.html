<header>
  <img class="logo-img" src="../logo/PlanoraLogo.png" alt="Planora" routerLink="" />
  <div class="icon-container">
    <button class="menu-btn" (click)="toggleMenu()" aria-label="Öppna meny">
      <div class="hamburgermenu-icon">
        <i *ngIf="isMenuOpen" class="fa-solid fa-xmark"></i>
        <i *ngIf="!isMenuOpen" class="fa-solid fa-bars"></i>
      </div>
    </button>
  </div>
  <nav class="top-nav" id="top-nav" [class.is-open]="isMenuOpen">
    <ul class="menu">
      <li><a routerLink="" (click)="isMenuOpen = false">Mina listor</a></li>
      <li><a routerLink="new-list" (click)="isMenuOpen = false">Skapa ny lista</a></li>
      <li><a routerLink="stars" (click)="isMenuOpen = false">Samlade stjärnor</a></li>
    </ul>
  </nav>
</header>
