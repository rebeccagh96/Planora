<div class="modal-backdrop" (click)="onClose()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ title }}</h2>
    </div>
    <div class="modal-body">
      <p>{{ message }}</p>
    </div>
    <div class="modal-footer">
      <button class="btn-confirm back-btn" (click)="onConfirm()">Ja</button>
      <button class="btn-cancel back-btn cancel" (click)="onClose()">Avbryt</button>
    </div>
  </div>
</div>
