<section class="new-list">
    <button class="back-btn" routerLink="">Tillbaka</button>
    <form (ngSubmit)="createList()">
        <h3>Skapa ny lista</h3>
        <label class="label-name">Namn på listan:</label>
        <input class="input-name" type="text" name="listName" [(ngModel)]="listName" required>
        <button class="new-list-btn" type="submit">Skapa lista</button>
    </form>
</section>
