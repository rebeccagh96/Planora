<section class="new-list">
  <button class="back-btn" routerLink="">
    <i class="fa-solid fa-angle-left icon"></i>Tillbaka
  </button>
  <form (ngSubmit)="createList()">
    <h1>Skapa ny lista</h1>
    <label for="list-name" class="label-name">Namn på listan:</label>
    <input
      class="input-name"
      type="text"
      name="listName"
      id="list-name"
      [(ngModel)]="listName"
      required
    />
    <button class="new-list-btn" type="submit">Skapa lista</button>
  </form>
  <app-notification #notification></app-notification>
</section>
