<section class="update-list">
  <button class="back-btn" [routerLink]="['/list/', toDoListId]">
    <i class="fa-solid fa-angle-left icon"></i>Tillbaka
  </button>
  <form (ngSubmit)="updateList()">
    <h1>Redigera listnamn:</h1>
    <input type="hidden" name="toDoListId" [(ngModel)]="toDoListId" />
    <input type="hidden" name="stars" [(ngModel)]="stars" />
    <label for="list-name" class="label-name">Nytt namn på listan:</label>
    <input
      class="input-name"
      type="text"
      name="listName"
      id="list-name"
      [(ngModel)]="listName"
      required
    />
    <button class="update-list-btn" type="submit">Spara</button>
  </form>
  <app-notification #notification></app-notification>
</section>
